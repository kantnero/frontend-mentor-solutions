<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <header>
      <img src="./images/logo.svg" alt="">
    </header>
    <main>
      <img src="./images/illustration-mockups.svg" alt="">
      <div class="hero-details">
        <h1>
  Build The Community Your Fans Will Love

        </h1>
        <p>
 Huddle re-imagines the way we build communities. You have a voice, but so does your audience. 
  Create connections with your users as you engage in genuine discussion. 
        </p>
        <a href="#">Register</a>
      </div>
    </main>
    <footer class="attribution">
      <div class="social-links">
        <a href="#">
          <img src="./design/icons/facebook-brands-solid-full.svg" alt="Facebook">
        </a>
        <a href="#">
          <img src="./design/icons/twitter-brands-solid-full.svg" alt="Twitter">
        </a>
        <a href="#">
          <img src="./design/icons/instagram-brands-solid-full.svg" alt="Instagram">
        </a>
      </div>
      <div class="contact">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="https://x.com/EUgwu44000">Emmanuel Ugwu</a>.
      </div>
    </footer>
  </div>
</body>
</html>
