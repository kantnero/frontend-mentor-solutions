<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>
  <div class="wrapper">
    <main class="card-container">
      <img src="./assets/images/illustration-article.svg" alt="Illustration of article" class="card-image"/>
      <span class="tag">
        Learning
      </span>
      <p class="date">
        <time datetime="2023-12-21">
          Published 21 Dec 2023
      </time>
      </p>
      
      <h1 class="title">
          HTML & CSS foundations
      </h1>
      <p class="details">
          These languages are the backbone of every website, defining structure, content, and presentation.
      </p>
      <div class="profile">
        <img src="./assets/images/image-avatar.webp" alt="Greg Hooper Image" class="profile-image"/>
        <p class="name">
            Greg Hooper
        </p>
      </div>
    </main>
    <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://x.com/EUgwu44000">Emmanuel Ugwu</a>.
  </footer>
  </div>
</body>
</html>
